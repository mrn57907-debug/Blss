<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Community</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

/* App Bar */
.appbar{
  background:#111827;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2937;
}

.logo{
  font-weight:bold;
  color:#c9a96e;
}

/* Auth Card */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:90vh;
  padding:15px;
}

.card{
  width:100%;
  max-width:360px;
  background:#111827;
  padding:20px;
  border-radius:18px;
  border:1px solid #1f2937;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input{
  padding:14px;
  border-radius:10px;
  border:1px solid #2b3548;
  background:#0f172a;
  color:white;
  outline:none;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#c9a96e;
  color:black;
}

/* Home */
.home{
  display:none;
  padding:15px;
}

.userCard{
  background:#111827;
  padding:15px;
  border-radius:15px;
  border:1px solid #1f2937;
  margin-top:10px;
}

.badge{
  background:#ef4444;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="appbar">
  <div class="logo">ANDROID COMMUNITY</div>
  <div>
    <span id="adminBadge" class="badge" style="display:none">ADMIN</span>
  </div>
</div>

<!-- AUTH -->
<div id="auth" class="center">
  <div class="card">

    <h3>إنشاء حساب</h3>
    <input id="name" placeholder="الاسم">
    <input id="email" placeholder="الإيميل">
    <input id="pass" type="password" placeholder="كلمة السر">
    <button class="primary" onclick="register()">تسجيل</button>

    <hr>

    <h3>دخول</h3>
    <input id="loginEmail" placeholder="الإيميل">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <button class="primary" onclick="login()">دخول</button>

  </div>
</div>

<!-- HOME -->
<div id="home" class="home">

  <div class="userCard">
    👤 مرحباً: <span id="userName"></span>
  </div>

  <button onclick="logout()" style="margin-top:15px;background:#ef4444;color:white;width:100%;">
    تسجيل خروج
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 Firebase بتاعك */
const firebaseConfig = {
  apiKey: "AIzaSyAUkeqz4iGn4LwJf93EJa0JilIUoHHdVOs",
  authDomain: "ssss-27d97.firebaseapp.com",
  projectId: "ssss-27d97",
  storageBucket: "ssss-27d97.firebasestorage.app",
  messagingSenderId: "402050236451",
  appId: "1:402050236451:web:5f8ad5ddcd6a7c63377196",
  measurementId: "G-29ENC4J86D"
};

const ADMIN_UID = "LjQ83SsbQiZ12lFfvxqH2XOKdT62";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ID */
function shortId(){
  return Math.floor(1000000 + Math.random()*9000000);
}

/* تسجيل */
window.register = async () => {
  const cred = await createUserWithEmailAndPassword(
    auth,
    email.value,
    pass.value
  );

  await updateProfile(cred.user,{
    displayName:name.value
  });

  await setDoc(doc(db,"users",cred.user.uid),{
    uid:cred.user.uid,
    name:name.value,
    email:email.value,
    shortId:shortId(),
    isAdmin:cred.user.uid===ADMIN_UID,
    isBanned:false,
    createdAt:serverTimestamp()
  });
};

/* دخول */
window.login = () => {
  signInWithEmailAndPassword(auth,loginEmail.value,loginPass.value);
};

/* خروج */
window.logout = () => signOut(auth);

/* حالة */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    auth.style.display="none";
    home.style.display="block";

    userName.innerText = user.displayName;

    const snap = await getDoc(doc(db,"users",user.uid));

    if(snap.exists() && snap.data().isAdmin){
      adminBadge.style.display="inline-block";
    }

  }else{
    auth.style.display="flex";
    home.style.display="none";
  }
});
</script>

</body>
</html>
