<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0b1220;
  color:white;
}

.container{
  max-width:420px;
  margin:60px auto;
  background:#111827;
  padding:20px;
  border-radius:15px;
}

input{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#c9a96e;
  font-weight:bold;
  cursor:pointer;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111827;
}

.badge{
  background:red;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}
</style>

</head>

<body>

<div id="auth" class="container">
  <h2>تسجيل حساب</h2>
  <input id="name" placeholder="الاسم">
  <input id="email" placeholder="الإيميل">
  <input id="pass" type="password" placeholder="كلمة السر">
  <button onclick="register()">تسجيل</button>

  <hr>

  <h2>دخول</h2>
  <input id="loginEmail" placeholder="الإيميل">
  <input id="loginPass" type="password" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

  <div class="topbar">
    <div>
      <span id="username"></span>
      <span id="admin" class="badge" style="display:none">ADMIN</span>
    </div>
    <button onclick="logout()">خروج</button>
  </div>

  <div class="container">
    <h3>أهلاً بيك 👋</h3>
    <p>تم تسجيل الدخول بنجاح</p>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔥 Firebase Config بتاعك
const firebaseConfig = {
  apiKey: "AIzaSyAj0laBYTVJfRF96SAW6AM3_JphSNSf-kk",
  authDomain: "biss-ca903.firebaseapp.com",
  projectId: "biss-ca903",
  storageBucket: "biss-ca903.appspot.com",
  messagingSenderId: "236071338575",
  appId: "1:236071338575:web:e53ec4854b8bf1eee3603a",
  measurementId: "G-NNH8XJWS99"
};

const ADMIN_UID = "LjQ83SsbQiZ12lFfvxqH2XOKdT62";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// ID بسيط
function shortId(){
  return Math.floor(1000000 + Math.random()*9000000);
}

// تسجيل
window.register = async () => {
  try {
    const user = await createUserWithEmailAndPassword(
      auth,
      name.value + "@temp.com",
      pass.value
    );

    await updateProfile(user.user,{
      displayName:name.value
    });

    await setDoc(doc(db,"users",user.user.uid),{
      uid:user.user.uid,
      name:name.value,
      email:user.user.email,
      shortId: shortId(),
      isAdmin: user.user.uid === ADMIN_UID,
      isBanned:false,
      createdAt:serverTimestamp()
    });

  } catch(e){
    alert(e.message);
  }
};

// دخول
window.login = async () => {
  try{
    await signInWithEmailAndPassword(
      auth,
      loginEmail.value,
      loginPass.value
    );
  }catch(e){
    alert(e.message);
  }
};

// خروج
window.logout = async () => {
  await signOut(auth);
};

// حالة المستخدم
onAuthStateChanged(auth, async (user) => {

  if(user){
    currentUser = user;

    auth.style.display="none";
    app.style.display="block";

    username.innerText = user.displayName || "User";

    const snap = await getDoc(doc(db,"users",user.uid));

    if(snap.exists()){
      const data = snap.data();

      if(data.isAdmin){
        admin.style.display="inline-block";
      }

      if(data.isBanned){
        alert("تم حظرك");
        await signOut(auth);
      }
    }

  } else {
    currentUser = null;
    auth.style.display="block";
    app.style.display="none";
  }

});

</script>

</body>
</html>
