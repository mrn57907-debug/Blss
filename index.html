<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<style>

/* CSS اللي بعته */

.auth-card{
  width:100%;
  max-width:400px;
  margin:40px auto;
  background:#111827;
  border:1px solid #2b3548;
  border-radius:20px;
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.auth-card h2{
  color:white;
  margin:0;
}

.auth-card input{
  background:#0f172a;
  border:1px solid #2b3548;
  padding:14px;
  border-radius:12px;
  color:white;
  outline:none;
}

.auth-card button{
  background:#c9a96e;
  color:black;
  border:none;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.top-user-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:20px;
  background:#111827;
  border-bottom:1px solid #2b3548;
}

#adminBadge{
  background:#ef4444;
  color:white;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

</style>

</head>

<body>

<!-- واجهة الدخول -->
<div id="guestBox">
  <div class="auth-card">

    <h2>إنشاء حساب</h2>

    <input id="registerName" placeholder="الاسم">
    <input id="registerEmail" type="email" placeholder="الإيميل">
    <input id="registerPassword" type="password" placeholder="كلمة السر">

    <button onclick="registerUser()">إنشاء حساب</button>

    <hr>

    <h2>تسجيل الدخول</h2>

    <input id="loginEmail" type="email" placeholder="الإيميل">
    <input id="loginPassword" type="password" placeholder="كلمة السر">

    <button onclick="loginUser()">دخول</button>

  </div>
</div>

<div id="userBox" style="display:none">
  <div class="top-user-bar">

    <span id="userName"></span>

    <span id="adminBadge" style="display:none">ADMIN</span>

    <button onclick="logoutUser()">تسجيل خروج</button>

  </div>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "حط apiKey هنا",
  authDomain: "حط authDomain هنا",
  projectId: "حط projectId هنا",
  storageBucket: "حط storageBucket هنا",
  messagingSenderId: "حط messagingSenderId هنا",
  appId: "حط appId هنا"
};

const ADMIN_UID = "LjQ83SsbQiZ12lFfvxqH2XOKdT62";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

function generateShortId() {
  return Math.floor(1000000 + Math.random() * 9000000).toString();
}

window.registerUser = async function () {
  const name = document.getElementById("registerName").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const password = document.getElementById("registerPassword").value;

  if (!name || !email || !password) return alert("اكمل البيانات");

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);

    await updateProfile(cred.user, { displayName: name });

    await setDoc(doc(db, "users", cred.user.uid), {
      uid: cred.user.uid,
      name,
      email,
      shortId: generateShortId(),
      photoUrl: "",
      bio: "",
      isAdmin: cred.user.uid === ADMIN_UID,
      isBanned: false,
      isChatBanned: false,
      privacyDM: "open",
      blockedUsers: [],
      createdAt: serverTimestamp()
    });

    alert("تم إنشاء الحساب");

  } catch (e) {
    alert(e.message);
  }
};

window.loginUser = async function () {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) return alert("اكتب البيانات");

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("تم تسجيل الدخول");
  } catch (e) {
    alert(e.message);
  }
};

window.logoutUser = async function () {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {

  if (user) {
    currentUser = user;

    document.getElementById("userBox").style.display = "flex";
    document.getElementById("guestBox").style.display = "none";

    document.getElementById("userName").innerText =
      user.displayName || "مستخدم";

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const data = snap.data();

      if (data.isBanned) {
        alert("تم حظر حسابك");
        await signOut(auth);
      }

      if (data.isAdmin) {
        document.getElementById("adminBadge").style.display = "inline-flex";
      }
    }

  } else {
    currentUser = null;
    document.getElementById("userBox").style.display = "none";
    document.getElementById("guestBox").style.display = "block";
  }

});

</script>

</body>
</html>
