<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BIS Community</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs, deleteDoc, updateDoc, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAj0laBYTVJfRF96SAW6AM3_JphSNSf-kk",
  authDomain: "biss-ca903.firebaseapp.com",
  projectId: "biss-ca903",
  storageBucket: "biss-ca903.firebasestorage.app",
  messagingSenderId: "236071338575",
  appId: "1:236071338575:web:e53ec4854b8bf1eee3603a"
};

const ADMIN_UID = "LjQ83SsbQiZ12lFfvxqH2XOKdT62";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;
let currentUserData = null;
let isAdmin = false;
let chatUnsub = null;
let dmUnsub = null;
let activeDmUid = null;

// ── AUTH STATE ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    isAdmin = user.uid === ADMIN_UID;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      currentUserData = snap.data();
      if (currentUserData.isBanned) {
        await signOut(auth);
        showAuthError('تم حظر حسابك نهائياً من الموقع');
        return;
      }
    }
    showApp(user);
    subscribeChat();
    if (isAdmin) {
      document.getElementById('adminNavBtn').style.display = 'flex';
      loadAdminData();
    }
  } else {
    currentUser = null;
    currentUserData = null;
    isAdmin = false;
    if (chatUnsub) chatUnsub();
    if (dmUnsub) dmUnsub();
    showAuthScreen();
  }
});

// ── REGISTER ────────────────────────────────────────────────
window.registerUser = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const year = document.getElementById('regYear').value;
  if (!name || !email || !pass || !year) return showAuthError('اكمل كل الحقول');
  if (pass.length < 6) return showAuthError('كلمة السر 6 احرف على الاقل');
  setAuthLoading(true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    const uid = cred.user.uid;
    const shortId = uid.substring(0, 8).toUpperCase();
    await setDoc(doc(db, 'users', uid), {
      uid, name, email, year,
      shortId,
      bio: '',
      photoUrl: '',
      isAdmin: false,
      isBanned: false,
      isChatBanned: false,
      privacyDM: 'open',
      blockedUsers: [],
      joinedAt: serverTimestamp()
    });
  } catch (e) { showAuthError(firebaseErr(e.code)); }
  setAuthLoading(false);
};

// ── LOGIN ────────────────────────────────────────────────────
window.loginUser = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return showAuthError('اكتب الايميل وكلمة السر');
  setAuthLoading(true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) { showAuthError(firebaseErr(e.code)); }
  setAuthLoading(false);
};

window.logoutUser = async () => {
  if (chatUnsub) chatUnsub();
  if (dmUnsub) dmUnsub();
  await signOut(auth);
};

// ── PUBLIC CHAT ──────────────────────────────────────────────
window.sendMsg = async () => {
  if (!currentUser) return;
  if (currentUserData?.isChatBanned) {
    showToast('تم حظر حسابك من ارسال رسائل مؤقتاً');
    return;
  }
  if (currentUserData?.isBanned) {
    showToast('تم حظر حسابك نهائياً');
    return;
  }
  const chatLock = document.getElementById('chatLockMsg');
  if (chatLock && chatLock.style.display !== 'none') {
    showToast('الدردشة مغلقة مؤقتاً');
    return;
  }
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    await addDoc(collection(db, 'messages'), {
      text,
      uid: currentUser.uid,
      name: currentUserData?.name || currentUser.displayName || 'مجهول',
      shortId: currentUserData?.shortId || '--------',
      photoUrl: currentUserData?.photoUrl || '',
      createdAt: serverTimestamp()
    });
  } catch(e) { console.error(e); }
};

function subscribeChat() {
  const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'), limit(100));
  chatUnsub = onSnapshot(q, (snap) => {
    const area = document.getElementById('msgArea');
    area.innerHTML = '';
    snap.forEach(d => renderMsg(d.data(), d.id, area));
    area.scrollTop = area.scrollHeight;
  });
}

function renderMsg(m, msgId, area) {
  const own = currentUser && m.uid === currentUser.uid;
  const colors = ['#c9a96e','#8b9cf4','#6ec9b0','#e49c8b','#b4c96e','#e49cb4'];
  const col = colors[(m.name||'a').charCodeAt(0) % colors.length];
  const div = document.createElement('div');
  div.className = 'msg' + (own ? ' own' : '');
  const ts = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}) : '';
  const av = m.photoUrl
    ? `<img src="${m.photoUrl}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid ${col}40">`
    : `<div class="msg-av" style="background:${col}20;color:${col};border:1px solid ${col}40">${(m.name||'?')[0].toUpperCase()}</div>`;
  const adminBtns = isAdmin ? `<button class="msg-del-btn" onclick="adminDeleteMsg('${msgId}')">🗑</button><button class="msg-ban-btn" onclick="adminQuickBan('${m.uid}','chat')">🚫</button><button class="msg-ban-btn" onclick="adminQuickBan('${m.uid}','full')" style="background:rgba(239,68,68,.15)">⛔</button>` : '';
  const reportBtn = !own ? `<button class="msg-report-btn" onclick="reportMsg('${msgId}','${escHtml(m.name||'')}')">⚑</button>` : '';
  div.innerHTML = `
    <div class="msg-av-wrap" onclick="viewProfile('${m.uid}')" style="cursor:pointer">${av}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name" style="color:${col}">${escHtml(m.name||'')}</span>
        <span class="msg-sid">#${m.shortId||'------'}</span>
        <span class="msg-ts">${ts}</span>
        ${reportBtn}${adminBtns}
      </div>
      <div class="msg-bubble">${renderContent(m.text)}</div>
    </div>`;
  area.appendChild(div);
}

function renderContent(text) {
  if (!text) return '';
  if (text.startsWith('<img ') || text.startsWith('<a ')) return text;
  return escHtml(text);
}

// ── FILE/IMAGE UPLOAD IN CHAT ────────────────────────────────
window.triggerFileUpload = (type) => {
  const input = document.getElementById(type === 'image' ? 'imgUploadInput' : 'pdfUploadInput');
  input.click();
};

async function uploadFile(file, type) {
  if (!currentUser) return;
  if (currentUserData?.isChatBanned) { showToast('محظور من الارسال مؤقتاً'); return; }
  showToast('جاري الرفع...');
  const ext = file.name.split('.').pop();
  const r = ref(storage, `chat/${Date.now()}_${currentUser.uid}.${ext}`);
  const snap = await uploadBytes(r, file);
  const url = await getDownloadURL(snap.ref);
  let content = '';
  if (type === 'image') {
    content = `<img src="${url}" style="max-width:220px;border-radius:10px;margin-top:4px;display:block">`;
  } else {
    content = `<a href="${url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.3);border-radius:8px;color:var(--gold);text-decoration:none;font-size:13px">📄 ${escHtml(file.name)}</a>`;
  }
  await addDoc(collection(db, 'messages'), {
    text: content,
    uid: currentUser.uid,
    name: currentUserData?.name || currentUser.displayName || 'مجهول',
    shortId: currentUserData?.shortId || '--------',
    photoUrl: currentUserData?.photoUrl || '',
    createdAt: serverTimestamp()
  });
  showToast('تم الرفع');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('imgUploadInput')?.addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (f) await uploadFile(f, 'image');
    e.target.value = '';
  });
  document.getElementById('pdfUploadInput')?.addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (f) await uploadFile(f, 'pdf');
    e.target.value = '';
  });
});

// ── DM / PRIVATE CHAT ────────────────────────────────────────
window.openDm = async (otherUid) => {
  if (!currentUser || otherUid === currentUser.uid) return;
  const otherSnap = await getDoc(doc(db, 'users', otherUid));
  if (!otherSnap.exists()) return;
  const other = otherSnap.data();
  if (other.privacyDM === 'closed') { showToast('هذا المستخدم اغلق الرسائل الخاصة'); return; }
  if ((other.blockedUsers || []).includes(currentUser.uid)) { showToast('لا يمكن ارسال رسالة لهذا المستخدم'); return; }
  activeDmUid = otherUid;
  document.getElementById('dmName').textContent = other.name;
  document.getElementById('dmId').textContent = '#' + other.shortId;
  document.getElementById('dmPanel').style.display = 'flex';
  subscribeDm(otherUid);
};

window.closeDm = () => {
  document.getElementById('dmPanel').style.display = 'none';
  if (dmUnsub) dmUnsub();
  activeDmUid = null;
};

function getChatId(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function subscribeDm(otherUid) {
  if (dmUnsub) dmUnsub();
  const chatId = getChatId(currentUser.uid, otherUid);
  const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('createdAt', 'asc'), limit(100));
  dmUnsub = onSnapshot(q, (snap) => {
    const area = document.getElementById('dmMsgArea');
    area.innerHTML = '';
    snap.forEach(d => {
      const m = d.data();
      const own = m.uid === currentUser.uid;
      const ts = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}) : '';
      const div = document.createElement('div');
      div.className = 'msg' + (own ? ' own' : '');
      div.innerHTML = `<div class="msg-body"><div class="msg-meta"><span class="msg-name">${escHtml(m.name||'')}</span><span class="msg-ts">${ts}</span></div><div class="msg-bubble">${renderContent(m.text)}</div></div>`;
      area.appendChild(div);
    });
    area.scrollTop = area.scrollHeight;
  });
}

window.sendDm = async () => {
  if (!currentUser || !activeDmUid) return;
  if (currentUserData?.isChatBanned || currentUserData?.isBanned) { showToast('محظور من الارسال'); return; }
  const input = document.getElementById('dmInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const chatId = getChatId(currentUser.uid, activeDmUid);
  const chatRef = doc(db, 'chats', chatId);
  const chatSnap = await getDoc(chatRef);
  if (!chatSnap.exists()) {
    await setDoc(chatRef, { participants: [currentUser.uid, activeDmUid], createdAt: serverTimestamp() });
  }
  await addDoc(collection(db, 'chats', chatId, 'messages'), {
    text,
    uid: currentUser.uid,
    name: currentUserData?.name || currentUser.displayName || 'مجهول',
    createdAt: serverTimestamp()
  });
};

window.dmHandleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDm(); } };

// ── PROFILE ──────────────────────────────────────────────────
window.viewProfile = async (uid) => {
  const snap = await getDoc(doc(db, 'users', uid));
  if (!snap.exists()) return;
  const d = snap.data();
  const isSelf = currentUser && uid === currentUser.uid;
  const modal = document.getElementById('profileModal');
  document.getElementById('profAvImg').src = d.photoUrl || '';
  document.getElementById('profAvImg').style.display = d.photoUrl ? 'block' : 'none';
  document.getElementById('profAvLetter').textContent = (d.name||'?')[0].toUpperCase();
  document.getElementById('profAvLetter').style.display = d.photoUrl ? 'none' : 'flex';
  document.getElementById('profName').textContent = d.name || '';
  document.getElementById('profShortId').textContent = '#' + (d.shortId || '--------');
  document.getElementById('profYear').textContent = d.year || '';
  document.getElementById('profBio').textContent = d.bio || 'لا توجد سيرة ذاتية';
  document.getElementById('profDmBtn').style.display = isSelf ? 'none' : 'flex';
  document.getElementById('profDmBtn').onclick = () => { closeProfile(); openDm(uid); };
  document.getElementById('profBlockBtn').style.display = isSelf ? 'none' : 'flex';
  document.getElementById('profBlockBtn').onclick = () => blockUser(uid);
  document.getElementById('profEditBtn').style.display = isSelf ? 'flex' : 'none';
  document.getElementById('profAdminBtns').style.display = isAdmin && !isSelf ? 'flex' : 'none';
  if (isAdmin && !isSelf) {
    document.getElementById('profBanChatBtn').onclick = () => adminBanChat(uid, !d.isChatBanned);
    document.getElementById('profBanChatBtn').textContent = d.isChatBanned ? 'رفع حظر الرسائل' : 'حظر من الرسائل';
    document.getElementById('profBanFullBtn').onclick = () => adminBanFull(uid, !d.isBanned);
    document.getElementById('profBanFullBtn').textContent = d.isBanned ? 'رفع الحظر الكامل' : 'حظر كامل من الموقع';
  }
  modal.style.display = 'flex';
};

window.closeProfile = () => { document.getElementById('profileModal').style.display = 'none'; };

window.openEditProfile = () => {
  document.getElementById('profileModal').style.display = 'none';
  document.getElementById('editName').value = currentUserData?.name || '';
  document.getElementById('editBio').value = currentUserData?.bio || '';
  document.getElementById('editPrivacy').value = currentUserData?.privacyDM || 'open';
  document.getElementById('editProfileModal').style.display = 'flex';
};

window.closeEditProfile = () => { document.getElementById('editProfileModal').style.display = 'none'; };

window.saveProfile = async () => {
  if (!currentUser) return;
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const privacyDM = document.getElementById('editPrivacy').value;
  const photoFile = document.getElementById('editPhoto').files[0];
  showToast('جاري الحفظ...');
  let photoUrl = currentUserData?.photoUrl || '';
  if (photoFile) {
    const r = ref(storage, `avatars/${currentUser.uid}`);
    const s = await uploadBytes(r, photoFile);
    photoUrl = await getDownloadURL(s.ref);
    await updateProfile(currentUser, { photoURL: photoUrl });
  }
  if (name) await updateProfile(currentUser, { displayName: name });
  await updateDoc(doc(db, 'users', currentUser.uid), { name: name || currentUserData?.name, bio, privacyDM, photoUrl });
  const snap = await getDoc(doc(db, 'users', currentUser.uid));
  currentUserData = snap.data();
  document.getElementById('headerName').textContent = currentUserData.name;
  document.getElementById('headerAv').textContent = (currentUserData.name||'?')[0].toUpperCase();
  if (photoUrl) document.getElementById('headerAv').style.backgroundImage = `url(${photoUrl})`;
  showToast('تم الحفظ');
  closeEditProfile();
};

window.blockUser = async (uid) => {
  if (!currentUser) return;
  const blocked = currentUserData?.blockedUsers || [];
  if (blocked.includes(uid)) {
    await updateDoc(doc(db, 'users', currentUser.uid), { blockedUsers: blocked.filter(u => u !== uid) });
    showToast('تم رفع الحظر');
  } else {
    await updateDoc(doc(db, 'users', currentUser.uid), { blockedUsers: [...blocked, uid] });
    showToast('تم حظر المستخدم');
  }
  const snap = await getDoc(doc(db, 'users', currentUser.uid));
  currentUserData = snap.data();
  closeProfile();
};

// ── REPORT ───────────────────────────────────────────────────
window.reportMsg = (msgId, senderName) => {
  document.getElementById('reportMsgId').value = msgId;
  document.getElementById('reportSenderName').textContent = senderName;
  document.getElementById('reportModal').style.display = 'flex';
};

window.closeReport = () => { document.getElementById('reportModal').style.display = 'none'; };

window.submitReport = async () => {
  const msgId = document.getElementById('reportMsgId').value;
  const reason = document.getElementById('reportReason').value.trim();
  if (!reason) { showToast('اكتب سبب البلاغ'); return; }
  await addDoc(collection(db, 'reports'), {
    messageId: msgId,
    reportedBy: currentUser.uid,
    reporterName: currentUserData?.name || '',
    reason,
    status: 'pending',
    createdAt: serverTimestamp()
  });
  showToast('تم ارسال البلاغ للادمن');
  closeReport();
};

// ── ADMIN ACTIONS ────────────────────────────────────────────
window.markReportReviewed = async (reportId) => {
  if (!isAdmin) return;
  await updateDoc(doc(db, 'reports', reportId), { status: 'reviewed' });
  loadAdminReports();
};

window.deleteReport = async (reportId) => {
  if (!isAdmin) return;
  await deleteDoc(doc(db, 'reports', reportId));
  loadAdminReports();
};

window.adminDeleteMsgAndReview = async (msgId, reportId) => {
  if (!isAdmin) return;
  await deleteDoc(doc(db, 'messages', msgId));
  await updateDoc(doc(db, 'reports', reportId), { status: 'reviewed' });
  showToast('تم حذف الرسالة وتحديث البلاغ');
  loadAdminReports();
};


window.adminDeleteMsg = async (msgId) => {
  if (!isAdmin) return;
  await deleteDoc(doc(db, 'messages', msgId));
  showToast('تم حذف الرسالة');
};

window.adminQuickBan = async (uid, type) => {
  if (!isAdmin || uid === ADMIN_UID) return;
  if (type === 'chat') await adminBanChat(uid, true);
  else await adminBanFull(uid, true);
  closeProfile();
};

window.adminBanChat = async (uid, ban) => {
  if (!isAdmin || uid === ADMIN_UID) return;
  await updateDoc(doc(db, 'users', uid), { isChatBanned: ban });
  showToast(ban ? 'تم حظر المستخدم من الرسائل' : 'تم رفع حظر الرسائل');
  loadAdminUsers();
  closeProfile();
};

window.adminBanFull = async (uid, ban) => {
  if (!isAdmin || uid === ADMIN_UID) return;
  await updateDoc(doc(db, 'users', uid), { isBanned: ban, isChatBanned: ban });
  showToast(ban ? 'تم الحظر الكامل' : 'تم رفع الحظر الكامل');
  loadAdminUsers();
  closeProfile();
};

// ── CHAT LOCK (temp close) ───────────────────────────────────
window.lockChat = async () => {
  if (!isAdmin) return;
  const mins = parseInt(document.getElementById('lockMins').value) || 5;
  const lockUntil = Date.now() + mins * 60 * 1000;
  await setDoc(doc(db, 'settings', 'chat'), { locked: true, lockUntil });
  showToast('تم قفل الدردشة لمدة ' + mins + ' دقيقة');
  checkChatLock();
};

window.unlockChat = async () => {
  if (!isAdmin) return;
  await setDoc(doc(db, 'settings', 'chat'), { locked: false, lockUntil: 0 });
  showToast('تم فتح الدردشة');
  checkChatLock();
};

async function checkChatLock() {
  const snap = await getDoc(doc(db, 'settings', 'chat'));
  const lockMsg = document.getElementById('chatLockMsg');
  const inputRow = document.getElementById('chatInputRow');
  if (snap.exists() && snap.data().locked && snap.data().lockUntil > Date.now()) {
    const remaining = Math.ceil((snap.data().lockUntil - Date.now()) / 60000);
    lockMsg.style.display = 'flex';
    lockMsg.querySelector('span').textContent = 'الدردشة مغلقة مؤقتاً — تفتح خلال ' + remaining + ' دقيقة';
    inputRow.style.display = 'none';
  } else {
    if (snap.exists() && snap.data().locked) {
      await setDoc(doc(db, 'settings', 'chat'), { locked: false, lockUntil: 0 });
    }
    lockMsg.style.display = 'none';
    inputRow.style.display = 'flex';
  }
}

// ── ADMIN PANEL DATA ─────────────────────────────────────────
async function loadAdminData() {
  loadAdminUsers();
  loadAdminReports();
  loadAdminSubjects();
  loadAdminSections();
  loadAdminNews();
  loadAdminSchedule();
  loadAdminSummaries();
  checkChatLock();
  const counts = {};
  for (const c of ['subjects','sections','news','schedule','summaries','messages','users','reports']) {
    const s = await getDocs(collection(db, c));
    counts[c] = s.size;
  }
  document.getElementById('statUsers').textContent = counts.users || 0;
  document.getElementById('statMsgs').textContent = counts.messages || 0;
  document.getElementById('statFiles').textContent = counts.summaries || 0;
  document.getElementById('statReports').textContent = counts.reports || 0;
}

window.loadAdminUsers = async () => {
  const snap = await getDocs(query(collection(db, 'users'), orderBy('joinedAt', 'desc')));
  const el = document.getElementById('adminUsersList');
  if (!el) return;
  el.innerHTML = '';
  snap.forEach(d => {
    const u = d.data();
    if (u.uid === ADMIN_UID) return;
    const div = document.createElement('div');
    div.className = 'admin-row';
    const statusBadge = u.isBanned
      ? '<span style="color:var(--red);font-size:10px;border:1px solid rgba(228,156,139,.3);padding:1px 6px;border-radius:4px">محظور كامل</span>'
      : u.isChatBanned
      ? '<span style="color:var(--yellow);font-size:10px;border:1px solid rgba(245,158,11,.3);padding:1px 6px;border-radius:4px">محظور رسائل</span>'
      : '<span style="color:var(--green);font-size:10px;border:1px solid rgba(110,201,176,.3);padding:1px 6px;border-radius:4px">نشط</span>';
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${escHtml(u.name||'')} <span style="color:var(--muted);font-size:11px">#${u.shortId||''}</span></div>
        <div style="font-size:11px;color:var(--muted)">${escHtml(u.email||'')} — ${u.year||''}</div>
      </div>
      ${statusBadge}
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="admin-act-btn" onclick="adminBanChat('${u.uid}',${!u.isChatBanned})" title="${u.isChatBanned?'رفع حظر الرسائل':'حظر من الرسائل'}">${u.isChatBanned?'✓💬':'🚫'}</button>

window.uploadSummary = async () => {

  await addDoc(collection(db, 'summaries'), { subject, name: file.name, url, size: (file.size/1024/1024).toFixed(1)+' MB', uploadedAt: serverTimestamp(), uid: currentUser.uid });

window.loadSubjects = async () => {
  const snap = await getDocs(query(collection(db, 'subjects'), orderBy('createdAt','asc')));
  const el = document.getElementById('subjectsGrid');
  if (!el) return;
  el.innerHTML = '';
  if (snap.empty) { el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1">لا توجد مواد بعد</div>'; return; }
  snap.forEach(d => {
    const data = d.data();
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.borderTopColor = data.color;
    card.innerHTML = `<div class="subj-head"><div class="subj-dot" style="background:${data.color}"></div><div><div class="subj-name">${escHtml(data.name)}</div><div class="subj-code">${escHtml(data.code)}</div></div></div><div class="subj-body" id="files_${d.id}"><div style="color:var(--muted);font-size:12px">جاري التحميل...</div></div>`;
    el.appendChild(card);
    loadFilesForSubject(data.name, `files_${d.id}`);
  });
};

async function loadFilesForSubject(subject, elId) {
  const snap = await getDocs(collection(db, 'summaries'));
  const el = document.getElementById(elId);
  if (!el) return;
  const files = [];
  snap.forEach(d => { if (d.data().subject === subject) files.push({...d.data(), id: d.id}); });
  if (!files.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">لا توجد ملفات بعد</div>'; return; }
  el.innerHTML = files.map(f => `<a href="${f.url}" target="_blank" class="file-row"><span class="file-ico">📄</span><span>${escHtml(f.name)}</span><span class="file-sz">${f.size}</span><span>↓</span></a>`).join('');
}

window.loadSections = async () => {

window.loadSchedule = async () => {
  const snap = await getDocs(collection(db, 'schedule'));
  const el = document.getElementById('scheduleTable');
  if (!el) return;
  const days = ['السبت','الاحد','الاثنين','الثلاثاء','الاربعاء','الخميس'];
  const times = ['8:00','10:00','12:00','14:00','16:00'];
  const data = {};
  snap.forEach(d => { data[d.data().day+'_'+d.data().time] = d.data(); });
  const palette = ['#c9a96e','#8b9cf4','#6ec9b0','#e49c8b','#b4c96e'];
  const subColors = {}; let ci = 0;
  el.innerHTML = `<div class="sch-row sch-header-bg"><div class="sch-time-cell"></div>${days.map(d=>`<div class="sch-col-head">${d}</div>`).join('')}</div>` +
    times.map(t => `<div class="sch-row"><div class="sch-time-cell">${t}</div>${days.map(d => {
      const k = d+'_'+t;
      if (data[k]) {
        const s = data[k].subject;
        if (!subColors[s]) subColors[s] = palette[ci++ % palette.length];
        const c = subColors[s];
        return `<div class="sch-cell"><div class="sch-class" style="background:${c}15;color:${c};border-color:${c}30">${escHtml(s)}<div class="sch-room">${escHtml(data[k].room||'')}</div></div></div>`;
      }
      return '<div class="sch-cell"></div>';
    }).join('')}</div>`).join('');
};

window.loadNews = async () => {
  const snap = await getDocs(query(collection(db, 'news'), orderBy('createdAt','desc')));
  const el = document.getElementById('newsFeed');
  if (!el) return;
  el.innerHTML = '';
  if (snap.empty) { el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:40px">لا توجد اخبار</div>'; return; }
  const tagStyles = {urgent:'#ef4444',exam:'#f59e0b',event:'#10b981',general:'#8b9cf4'};
  const tagLabels = {urgent:'🔥 عاجل',exam:'📝 امتحانات',event:'🎯 فعاليات',general:'📌 عام'};
  let i = 1;
  snap.forEach(d => {
    const data = d.data();
    const c = tagStyles[data.tag]||'#8b9cf4';
    const lbl = tagLabels[data.tag]||data.tag;
    const ts = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleDateString('ar') : '';
    const card = document.createElement('div');
    card.className = 'news-card';
    card.style.borderRightColor = c;
    card.innerHTML = `<div class="news-num" style="color:${c}25">${String(i++).padStart(2,'0')}</div><div class="news-content"><div class="news-tag" style="color:${c};background:${c}15;border:1px solid ${c}30">${lbl}</div><div class="news-title">${escHtml(data.title)}</div><div class="news-body">${escHtml(data.body||'')}</div><div class="news-date">${ts}</div></div>`;
    el.appendChild(card);
  });
};

window.loadSummaries = loadSubjects;

// ── HELPERS ──────────────────────────────────────────────────
function escHtml(t) { if(!t) return ''; return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function firebaseErr(code) {
  const map = {'auth/email-already-in-use':'الايميل موجود بالفعل','auth/wrong-password':'كلمة السر غلط','auth/user-not-found':'مفيش حساب بهذا الايميل','auth/invalid-email':'الايميل مش صح','auth/weak-password':'كلمة السر ضعيفة','auth/invalid-credential':'الايميل او كلمة السر غلط'};
  return map[code] || 'حصل خطا، حاول تاني';
}
function showAuthError(msg) { const el = document.getElementById('authError'); el.textContent = msg; el.style.display='block'; setTimeout(()=>el.style.display='none',4000); }
function setAuthLoading(v) { document.querySelectorAll('.auth-btn').forEach(b=>{b.disabled=v; b.textContent=v?'...':b.dataset.label;}); }
window.showToast = (msg) => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); };
function showAuthScreen() { document.getElementById('authScreen').style.display='flex'; document.getElementById('appShell').style.display='none'; }
function showApp(user) {
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('headerName').textContent = currentUserData?.name || user.displayName || 'مستخدم';

  loadSubjects(); loadSections(); loadSchedule(); loadNews();
  checkChatLock();
  setInterval(checkChatLock, 30000);
}
window.goTo = (id, el) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el) el.classList.add('active');
  if(id==='pgSummaries') loadSubjects();
  if(id==='pgSections') loadSections();
  if(id==='pgSchedule') loadSchedule();
  if(id==='pgNews') loadNews();
  document.getElementById('mobileMenu').style.display='none';
};
window.handleKey = (e) => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
window.autoResize = (el) => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };
window.showRegister = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='flex'; document.getElementById('authError').style.display='none'; };
window.showLogin = () => { document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='flex'; document.getElementById('authError').style.display='none'; };
window.toggleMenu = () => { const m=document.getElementById('mobileMenu'); m.style.display=m.style.display==='flex'?'none':'flex'; };
window.switchAdminTab = (id, el) => { document.querySelectorAll('.admin-tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); };
window.saveInstName = () => { const v=document.getElementById('instInput').value.trim(); if(v){document.getElementById('instName').textContent=v; showToast('تم الحفظ');} };

<style>
:root{--bg:#0c0c0e;--surface:#131318;--card:#18181f;--border:#252530;--gold:#c9a96e;--gold2:#e8c98a;--text:#f0ede8;--muted:#6b6878;--blue:#8b9cf4;--green:#6ec9b0;--red:#e49c8b;--yellow:#f59e0b;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;max-width:100vw;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-repeat:repeat;background-size:180px;pointer-events:none;z-index:9998;opacity:0.4;}

/* AUTH */
#authScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#1a1508 0%,var(--bg) 60%);padding:16px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;position:relative;overflow:hidden;animation:boxIn .4s cubic-bezier(.34,1.4,.64,1);}
.auth-box::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(201,169,110,0.15) 0%,transparent 70%);pointer-events:none;}
@keyframes boxIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-emblem{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border:2px solid var(--gold);border-radius:14px;font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--gold);margin-bottom:12px;}
.auth-title{font-size:24px;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif;}
.auth-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.auth-field{margin-bottom:10px;}
.auth-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.auth-input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;text-align:right;transition:border-color .2s;}
.auth-input:focus{border-color:var(--gold);}
.auth-btn{width:100%;padding:12px;background:linear-gradient(135deg,#b8893e,var(--gold2));border:none;border-radius:10px;color:#0c0c0e;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.auth-btn:hover{opacity:.9;}
.auth-switch{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
.auth-switch a{color:var(--gold);cursor:pointer;}
#authError{display:none;background:rgba(228,156,139,.1);border:1px solid rgba(228,156,139,.3);color:var(--red);border-radius:8px;padding:9px 12px;font-size:13px;margin-top:8px;text-align:center;}

/* APP SHELL — MOBILE FIRST */
#appShell{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
header{background:rgba(19,19,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:54px;flex-shrink:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-mark{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;font-weight:900;color:var(--gold);}
.logo-text{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);}
.header-right{display:flex;align-items:center;gap:8px;}
.u-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#b8893e,var(--gold2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0c0c0e;background-size:cover;background-position:center;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);padding:4px 8px;cursor:pointer;font-size:11px;}
.hamburger{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 8px;cursor:pointer;font-size:16px;display:flex;align-items:center;}

/* MOBILE MENU */
#mobileMenu{display:none;flex-direction:column;background:var(--surface);border-bottom:1px solid var(--border);padding:8px;gap:2px;flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);border:1px solid transparent;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;}
.nav-btn:hover{background:rgba(201,169,110,.05);color:var(--text);}
.nav-btn.active{background:rgba(201,169,110,.08);color:var(--gold);border-color:rgba(201,169,110,.15);}
.nav-ico{font-size:16px;width:20px;text-align:center;}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:rgba(19,19,24,.95);border-top:1px solid var(--border);flex-shrink:0;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;font-size:10px;color:var(--muted);gap:3px;border:none;background:none;font-family:'Tajawal',sans-serif;transition:color .2s;}
.bnav-btn.active,.bnav-btn:hover{color:var(--gold);}
.bnav-ico{font-size:20px;}

/* MAIN */
main{flex:1;overflow-y:auto;padding:16px;}
main::-webkit-scrollbar{width:3px;}
main::-webkit-scrollbar-thumb{background:var(--border);}
.page{display:none;animation:fadeUp .25s ease;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.page-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);}
.chat-top{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px;}
.chat-ico{width:34px;height:34px;border-radius:9px;background:rgba(201,169,110,.1);display:flex;align-items:center;justify-content:center;font-size:16px;}
.chat-top-name{font-weight:700;font-size:14px;}
.chat-top-status{font-size:11px;color:var(--green);}
#msgArea{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;background:var(--card);}
#msgArea::-webkit-scrollbar{width:2px;}
.msg{display:flex;gap:8px;}
.msg.own{flex-direction:row-reverse;}
.msg-av-wrap{flex-shrink:0;}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.msg-body{max-width:80%;}
.msg-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;padding:0 10px;flex-wrap:wrap;}
.msg.own .msg-meta{flex-direction:row-reverse;}
.msg-name{font-size:12px;font-weight:700;}
.msg-sid{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
.msg-ts{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
.msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:14px;border-top-right-radius:3px;padding:9px 12px;font-size:14px;line-height:1.5;}
.msg.own .msg-bubble{border-top-right-radius:14px;border-top-left-radius:3px;background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.2);}
.msg-del-btn,.msg-ban-btn,.msg-report-btn{background:rgba(228,156,139,.1);border:none;border-radius:4px;cursor:pointer;padding:1px 5px;font-size:11px;color:var(--muted);}
.msg-ban-btn{background:rgba(245,158,11,.1);}
.msg-report-btn{background:none;color:var(--muted);opacity:.5;}
.msg-report-btn:hover{opacity:1;color:var(--yellow);}
#chatLockMsg{display:none;align-items:center;justify-content:center;gap:8px;padding:10px;background:rgba(245,158,11,.08);border-top:1px solid rgba(245,158,11,.2);color:var(--yellow);font-size:13px;}
#chatInputRow{padding:10px 12px;border-top:1px solid var(--border);background:var(--card);border-radius:0 0 12px 12px;display:flex;gap:6px;align-items:flex-end;}
.msg-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;resize:none;outline:none;min-height:40px;max-height:100px;}
.msg-input:focus{border-color:var(--gold);}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,#b8893e,var(--gold2));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#0c0c0e;flex-shrink:0;}
.att-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* DM PANEL */
#dmPanel{display:none;position:fixed;inset:0;z-index:400;flex-direction:column;background:var(--bg);}
.dm-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card);}
.dm-back{background:none;border:none;color:var(--gold);font-size:20px;cursor:pointer;}
#dmMsgArea{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.dm-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--card);}
.dm-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;}
.dm-input:focus{border-color:var(--gold);}

/* SUBJECTS */
#subjectsGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.subject-card{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:12px;overflow:hidden;}
.subj-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.subj-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.subj-name{font-size:13px;font-weight:700;}
.subj-code{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.subj-body{padding:10px 14px;display:flex;flex-direction:column;gap:5px;}
.file-row{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:12px;text-decoration:none;color:var(--text);}
.file-ico{font-size:13px;}
.file-sz{margin-right:auto;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}

/* SECTIONS */
#sectionsGrid{display:flex;flex-direction:column;gap:10px;}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sec-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sec-subject{font-size:15px;font-weight:700;}
.sec-badge{background:rgba(139,156,244,.1);color:var(--blue);border:1px solid rgba(139,156,244,.2);border-radius:6px;padding:2px 8px;font-size:11px;font-family:'DM Mono',monospace;}
.sec-grid{display:grid;grid-template-columns:1fr 1fr;}
.sec-cell{padding:10px 16px;border-left:1px solid var(--border);}
.sec-cell:last-child{border-left:none;}
.sec-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.sec-val{font-size:13px;font-weight:600;}

/* SCHEDULE */
#scheduleTable{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:auto;}
.sch-row{display:grid;grid-template-columns:46px repeat(6,1fr);border-bottom:1px solid var(--border);}
.sch-row:last-child{border-bottom:none;}
.sch-header-bg{background:var(--surface);}
.sch-col-head{padding:8px 4px;text-align:center;font-size:9px;font-weight:700;color:var(--muted);border-left:1px solid var(--border);}
.sch-time-cell{padding:10px 4px;text-align:center;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.sch-cell{padding:3px;border-left:1px solid var(--border);min-height:50px;}
.sch-class{border-radius:5px;border:1px solid;padding:3px;font-size:9px;font-weight:600;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;text-align:center;}
.sch-room{opacity:.7;font-size:8px;}

/* NEWS */
#newsFeed{display:flex;flex-direction:column;gap:10px;}
.news-card{background:var(--card);border:1px solid var(--border);border-right:3px solid var(--gold);border-radius:12px;padding:14px;display:flex;gap:10px;}
.news-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;flex-shrink:0;width:40px;line-height:1;}
.news-content{flex:1;}
.news-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-bottom:6px;}
.news-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.news-body{font-size:13px;color:var(--muted);line-height:1.6;}
.news-date{font-size:10px;color:var(--muted);margin-top:8px;font-family:'DM Mono',monospace;}

/* ADMIN */
.admin-header{background:linear-gradient(135deg,rgba(201,169,110,.1),transparent);border:1px solid rgba(201,169,110,.2);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.admin-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.stats-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-mini{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-mini-n{font-size:24px;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif;}
.stat-mini-l{font-size:10px;color:var(--muted);margin-top:2px;}
.admin-tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto;}
.atab{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:'Tajawal',sans-serif;white-space:nowrap;}
.atab.active{color:var(--gold);border-bottom-color:var(--gold);}
.admin-tab-content{display:none;}
.admin-tab-content.active{display:block;animation:fadeUp .2s ease;}
.admin-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.admin-form-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.form-field{display:flex;flex-direction:column;gap:3px;}
.form-field label{font-size:11px;color:var(--muted);}
.f-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
.f-input:focus{border-color:var(--gold);}
.f-area{min-height:70px;resize:vertical;}
.save-btn{background:linear-gradient(135deg,#b8893e,var(--gold2));border:none;border-radius:8px;color:#0c0c0e;padding:9px 16px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.admin-list-box{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:10px;}
.admin-list-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;}
.admin-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(37,37,48,.6);font-size:13px;}
.admin-row:last-child{border-bottom:none;}
.admin-code{margin-right:auto;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.del-btn{background:rgba(228,156,139,.1);border:1px solid rgba(228,156,139,.2);color:var(--red);border-radius:5px;padding:2px 7px;font-size:11px;cursor:pointer;}
.admin-act-btn{background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.2);color:var(--gold);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;}
.lock-row{display:flex;align-items:center;gap:8px;margin-top:10px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:360px;animation:boxIn .3s ease;}
.modal-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.prof-av-lg{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#b8893e,var(--gold2));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#0c0c0e;margin:0 auto 12px;background-size:cover;background-position:center;overflow:hidden;}
.prof-av-lg img{width:100%;height:100%;object-fit:cover;}
.prof-name{font-size:18px;font-weight:700;text-align:center;}
.prof-sid{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;margin-bottom:4px;}
.prof-year{font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;}
.prof-bio{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:16px;padding:0 8px;}
.prof-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.prof-btn{padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Tajawal',sans-serif;}
.prof-btn.primary{background:linear-gradient(135deg,#b8893e,var(--gold2));color:#0c0c0e;border:none;}
.prof-btn.danger{background:rgba(228,156,139,.1);color:var(--red);border-color:rgba(228,156,139,.3);}
.prof-admin-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:9px 18px;font-size:13px;color:var(--gold);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-emblem">BIS</div>
      <div class="auth-title">BIS Community</div>
      <div class="auth-sub">مجتمع طلاب نظم معلومات الاعمال</div>
    </div>
    <div id="loginForm" style="display:flex;flex-direction:column">
      <div class="auth-field"><label>الايميل</label><input class="auth-input" id="loginEmail" type="email" dir="ltr" placeholder="example@email.com"></div>
      <div class="auth-field"><label>كلمة السر</label><input class="auth-input" id="loginPass" type="password" dir="ltr" placeholder="••••••••"></div>
      <button class="auth-btn" data-label="تسجيل الدخول" onclick="loginUser()">تسجيل الدخول</button>
      <div class="auth-switch">مش عندك حساب؟ <a onclick="showRegister()">سجل دلوقتي</a></div>
    </div>
    <div id="registerForm" style="display:none;flex-direction:column">
      <div class="auth-field"><label>الاسم (يمكن وهمي)</label><input class="auth-input" id="regName" type="text" placeholder="DataKing ..."></div>
      <div class="auth-field"><label>الايميل</label><input class="auth-input" id="regEmail" type="email" dir="ltr" placeholder="example@email.com"></div>
      <div class="auth-field"><label>كلمة السر</label><input class="auth-input" id="regPass" type="password" dir="ltr" placeholder="6 احرف على الاقل"></div>
      <div class="auth-field"><label>السنة الدراسية</label>
        <select class="auth-input" id="regYear">
          <option value="" disabled selected>اختر سنتك</option>
          <option>السنة الاولى</option><option>السنة الثانية</option><option>السنة الثالثة</option><option>السنة الرابعة</option>
        </select>
      </div>
      <button class="auth-btn" data-label="انشاء حساب" onclick="registerUser()">انشاء حساب</button>
      <div class="auth-switch">عندك حساب؟ <a onclick="showLogin()">سجل دخول</a></div>
    </div>
    <div id="authError"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <header>
    <div class="logo-wrap">
      <div class="logo-mark">BIS</div>
      <div class="logo-text">BIS Community</div>
    </div>
    <div class="header-right">
      <div class="u-av" id="headerAv" onclick="viewProfile(currentUser?.uid)">?</div>
      <span id="headerName" style="font-size:13px;color:var(--muted)"></span>
      <button class="logout-btn" onclick="logoutUser()">خروج</button>
    </div>
  </header>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav" style="order:99">
    <button class="bnav-btn active" onclick="goTo('pgChat',this)"><span class="bnav-ico">💬</span>الشات</button>
    <button class="bnav-btn" onclick="goTo('pgSummaries',this)"><span class="bnav-ico">📚</span>ملخصات</button>
    <button class="bnav-btn" onclick="goTo('pgSections',this)"><span class="bnav-ico">👥</span>سكاشن</button>
    <button class="bnav-btn" onclick="goTo('pgSchedule',this)"><span class="bnav-ico">📅</span>جدول</button>
    <button class="bnav-btn" onclick="goTo('pgNews',this)"><span class="bnav-ico">📢</span>اخبار</button>
    <button class="bnav-btn" id="adminNavBtn" style="display:none" onclick="goTo('pgAdmin',this)"><span class="bnav-ico">👑</span>ادمن</button>
  </div>

  <main>
    <!-- CHAT -->
    <div class="page active" id="pgChat">
      <div class="chat-wrap">
        <div class="chat-top">
          <div class="chat-ico">💬</div>
          <div><div class="chat-top-name">الشات العام</div><div class="chat-top-status">● مباشر</div></div>
        </div>
        <div id="msgArea"></div>
        <div id="chatLockMsg"><span></span></div>
        <div id="chatInputRow">
          <button class="att-btn" onclick="triggerFileUpload('image')" title="صورة">🖼</button>
          <button class="att-btn" onclick="triggerFileUpload('pdf')" title="PDF">📄</button>
          <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالة..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
        <input type="file" id="imgUploadInput" accept="image/*" style="display:none">
        <input type="file" id="pdfUploadInput" accept="application/pdf" style="display:none">
      </div>
    </div>

    <!-- SUMMARIES -->
    <div class="page" id="pgSummaries">
      <div class="page-title">📚 ملخصات المواد</div>
      <div class="page-sub">الملفات والملخصات — الادمن يرفع والكل يستفيد</div>
      <div id="subjectsGrid"></div>
    </div>

    <!-- SECTIONS -->
    <div class="page" id="pgSections">
      <div class="page-title">👥 السكاشن</div>
      <div class="page-sub">مواعيد وتفاصيل كل سكشن</div>
      <div id="sectionsGrid"></div>
    </div>

    <!-- SCHEDULE -->
    <div class="page" id="pgSchedule">
      <div class="page-title">📅 الجدول</div>
      <div class="page-sub">جدول الاسبوع الدراسي</div>
      <div id="scheduleTable"></div>
    </div>

    <!-- NEWS -->
    <div class="page" id="pgNews">
      <div class="page-title">📢 اخبار المعهد</div>
      <div class="page-sub">كل جديد من الادارة</div>
